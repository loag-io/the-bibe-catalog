name: cicd-pipeline

on:
  push:
    branches: [ prod, dev, ua ]
  pull_request:
    branches: [ prod, dev, ua ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - ua
        - prod

env:
  PYTHON_VERSION: '3.9'
  
jobs:
  # Build Job
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/prod' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/ua'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build complete
      run: |
        echo "✓ Build stage complete"

  # Deploy to Development
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev'
    environment: dev
    
    env:
      ENVIRONMENT: dev
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      DEBUG: true
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          database/
          config/
          requirements.txt
        sparse-checkout-cone-mode: false
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    # - name: Install dependencies
    #   run: |
    #     pip install jupyter nbconvert ipykernel
    #     pip install -r requirements.txt
        
    # - name: Configure Python kernel
    #   run: |
    #     python -m ipykernel install --user --name python3
        
    # - name: Run database setup
    #   run: |
    #     echo "Converting notebook to Python script..."
    #     jupyter nbconvert --to python database/setup/database_setup.ipynb --output-dir=/tmp
    #     
    #     echo "Running database setup with environment: $ENVIRONMENT"
    #     export MOTHERDUCK_TOKEN="${MOTHERDUCK_TOKEN}"
    #     export ENVIRONMENT="${ENVIRONMENT}"
    #     export DEBUG="${DEBUG}"
    #     python /tmp/database_setup.py
        
    - name: Verify deployment
      run: |
        echo "✓ Development deployment successful"
        echo "Environment: $ENVIRONMENT"

  # Deploy to User Acceptance
  deploy-ua:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/ua'
    environment: ua
    
    env:
      ENVIRONMENT: ua
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      DEBUG: false
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          database/
          config/
          requirements.txt
        sparse-checkout-cone-mode: false
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    # - name: Install dependencies
    #   run: |
    #     pip install jupyter nbconvert ipykernel
    #     pip install -r requirements.txt
        
    # - name: Configure Python kernel
    #   run: |
    #     python -m ipykernel install --user --name python3
        
    # - name: Run database setup
    #   run: |
    #     echo "Converting notebook to Python script..."
    #     jupyter nbconvert --to python database/setup/database_setup.ipynb --output-dir=/tmp
    #     
    #     echo "Running database setup with environment: $ENVIRONMENT"
    #     export MOTHERDUCK_TOKEN="${MOTHERDUCK_TOKEN}"
    #     export ENVIRONMENT="${ENVIRONMENT}"
    #     export DEBUG="${DEBUG}"
    #     python /tmp/database_setup.py
        
    - name: Verify deployment
      run: |
        echo "✓ User Acceptance deployment successful"
        echo "Environment: $ENVIRONMENT"
        
  # Deploy to Production
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/prod'
    environment: prod
    
    env:
      ENVIRONMENT: prod
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      DEBUG: false
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          database/
          config/
          requirements.txt
        sparse-checkout-cone-mode: false
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    # - name: Install dependencies
    #   run: |
    #     pip install jupyter nbconvert ipykernel
    #     pip install -r requirements.txt
        
    # - name: Configure Python kernel
    #   run: |
    #     python -m ipykernel install --user --name python3
        
    # - name: Run database setup
    #   run: |
    #     echo "Converting notebook to Python script..."
    #     jupyter nbconvert --to python database/setup/database_setup.ipynb --output-dir=/tmp
    #     
    #     echo "Running database setup with environment: $ENVIRONMENT"
    #     export MOTHERDUCK_TOKEN="${MOTHERDUCK_TOKEN}"
    #     export ENVIRONMENT="${ENVIRONMENT}"
    #     export DEBUG="${DEBUG}"
    #     python /tmp/database_setup.py
        
    - name: Verify deployment
      run: |
        echo "✓ Production deployment successful"
        echo "Environment: $ENVIRONMENT"
        
    - name: Generate release version and timestamp
      id: version
      run: |
        # Generate version in YYYY.MM.DD - <Release Number> format (CST)
        DATE=$(TZ='America/Chicago' date '+%Y.%m.%d')
        VERSION="${DATE} - ${{ github.run_number }}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        
        # Generate full timestamp
        TIMESTAMP=$(TZ='America/Chicago' date '+%Y-%m-%d %I:%M:%S %p %Z')
        echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
        body: |
          🚀 Automated release from prod branch
          
          **Version:** ${{ steps.version.outputs.version }}
          **Commit:** ${{ github.sha }}
          **Author:** ${{ github.actor }}
          **Timestamp:** ${{ steps.version.outputs.timestamp }}
          
          ## 📝 Changelog
          ${{ github.event.head_commit.message }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Notify Discord - Success
      if: success()
      run: |
        # Get version and timestamp in CST
        DATE=$(TZ='America/Chicago' date '+%Y.%m.%d')
        VERSION="${DATE} - ${{ github.run_number }}"
        TIMESTAMP=$(TZ='America/Chicago' date '+%Y-%m-%d %I:%M:%S %p %Z')
        
        # Get the last 10 commit messages for changelog
        COMMIT_COUNT=$(git rev-list --count HEAD)
        CHANGELOG=$(git log --pretty=format:"• %s (%an)" -10 | sed 's/"/\\"/g')
        
        # Add ellipsis if there are more than 10 commits
        if [ "$COMMIT_COUNT" -gt 10 ]; then
          CHANGELOG="${CHANGELOG}\n• ..."
        fi
        
        curl -H "Content-Type: application/json" \
             -d "{\"content\":\"✅ **Production Deployment Successful**\n\n**Environment:** prod\n**Release:** ${VERSION}\n**Author:** ${{ github.actor }}\n**Timestamp:** ${TIMESTAMP}\n\n**📝 Recent Changes:**\n${CHANGELOG}\n\n**🔗 Links:**\n• [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n• [Release](https://github.com/${{ github.repository }}/releases/tag/${VERSION})\"}" \
             ${{ secrets.DISCORD_WEBHOOK }}
        
    - name: Notify Discord - Failure
      if: failure()
      run: |
        curl -H "Content-Type: application/json" \
             -d "{\"content\":\"❌ **Production Deployment Failed**\n\n**Environment:** prod\n**Commit:** \`${{ github.sha }}\`\n**Author:** ${{ github.actor }}\n**Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nPlease check the logs for details.\"}" \
             ${{ secrets.DISCORD_WEBHOOK }}
